<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pemesanan Barang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div class="max-w-2xl mx-auto px-4 py-8">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-6 rounded-t-2xl shadow-md text-center">
            <h1 class="text-2xl font-bold tracking-wide"><i class="fa-solid fa-boxes-packing mr-2"></i>Form Pemesanan Barang</h1>
            <p class="text-blue-100 text-sm mt-1">Ketik dan periksa kembali pesanan toko Anda sebelum dikirim.</p>
        </div>

        <div class="bg-white p-6 rounded-b-2xl shadow-md space-y-6">
            
            <div>
                <label class="block text-gray-700 font-semibold mb-1 text-sm">
                    <i class="fa-solid fa-store text-blue-500 mr-1"></i> Nama Toko / Outlet <span class="text-red-500">*</span>
                </label>
                <select id="storeName" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-gray-50 font-medium text-gray-800 disabled:bg-gray-200 disabled:text-gray-500 disabled:cursor-not-allowed">
                    <option value="" disabled selected>-- Pilih Toko Anda --</option>
                    <option value="Toko Jababeka">Toko Jababeka</option>
                    <option value="Toko Pilar">Toko Pilar</option>
                    <option value="Toko Mega Regency">Toko Mega Regency</option>
                    <option value="Toko Lippo Cikarang">Toko Lippo Cikarang</option>
                </select>
                <p id="storeHelpText" class="text-xs text-gray-400 mt-1">Silakan pilih lokasi toko tempat Anda bertugas hari ini.</p>
            </div>

            <hr class="border-gray-200">

            <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100 space-y-4">
                <h3 class="text-blue-800 font-bold text-sm uppercase tracking-wider"><i class="fa-solid fa-cart-plus mr-1"></i> Tambah Item Barang</h3>
                
                <div>
                    <label class="block text-gray-600 text-xs font-medium mb-1">Cari Nama / Kode Barang (Mendukung Wildcard %)</label>
                    <div class="relative">
                        <input type="text" id="searchItem" oninput="filterProducts()" placeholder="Contoh: Aice% atau %Slush atau Kode" class="w-full p-2.5 pl-9 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-blue-400 focus:outline-none text-sm text-gray-700">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 text-sm">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </div>
                    </div>
                    <p class="text-[10px] text-gray-400 mt-0.5">Ketik kata kunci. Gunakan % di akhir/awal kata untuk memotong pencarian.</p>
                </div>

                <div>
                    <label class="block text-gray-600 text-xs font-medium mb-1">Pilih Produk</label>
                    <select id="itemName" class="w-full p-2.5 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-blue-400 focus:outline-none text-sm text-gray-700">
                        <option value="" disabled selected>-- Sedang memuat produk dari database... --</option>
                    </select>
                </div>

                <div>
                    <label class="block text-gray-600 text-xs font-medium mb-1">Jumlah Kuantitas (Qty)</label>
                    <input type="number" id="itemQty" min="1" placeholder="Contoh: 10" class="w-full p-2.5 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-blue-400 focus:outline-none text-sm text-gray-700">
                </div>

                <button type="button" onclick="addToCart()" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg text-sm font-semibold transition duration-200">
                    <i class="fa-solid fa-plus mr-1"></i> Masukkan ke Daftar Pesanan
                </button>
            </div>

            <div>
                <label class="block text-gray-700 font-semibold mb-2 text-sm">
                    <i class="fa-solid fa-list-check text-indigo-500 mr-1"></i> Daftar Pesanan Anda (Real-time)
                </label>
                
                <div class="border border-gray-200 rounded-lg overflow-hidden bg-gray-50">
                    <table class="w-full text-left text-sm text-gray-700">
                        <thead class="bg-gray-200 text-gray-600 text-xs uppercase font-bold">
                            <tr>
                                <th class="p-3">Nama Barang</th>
                                <th class="p-3 text-center w-20">Qty</th>
                                <th class="p-3 text-center w-16">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="cartTableBody">
                            <tr id="emptyRow">
                                <td colspan="3" class="p-4 text-center text-gray-400 italic text-xs">Belum ada barang yang ditambahkan.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="pt-2">
                <button id="btnSubmit" onclick="submitOrder()" class="w-full bg-green-600 hover:bg-green-700 text-white p-3.5 rounded-xl font-bold text-base shadow-lg transition duration-200 flex justify-center items-center gap-2">
                    <i class="fa-solid fa-paper-plane"></i> Kirim Semua Pesanan Sekarang
                </button>
            </div>

        </div>
    </div>

    <script>
        let cart = [];
        let allProducts = []; // Menampung data master barang asli
        
        // ⚠️ TEMPELKAN URL RE-DEPLOYMENT BARU ANDA DI BAWAH INI:
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhPHgVtlymoy-IzxrE5CeRYPfgV7bwASy_aKuRtXqCimU4bkGk36IdZVgMY5xW9fJR/exec"; 

        // AMBIL DATA BARANG & KODE SAAT HALAMAN DIBUKA
        document.addEventListener("DOMContentLoaded", function() {
            const itemSelect = document.getElementById('itemName');
            
            fetch(APPS_SCRIPT_URL)
            .then(response => response.json())
            .then(result => {
                if (result.status === "success") {
                    allProducts = result.data; 
                    renderProductOptions(allProducts);
                } else {
                    itemSelect.innerHTML = `<option value="" disabled selected>-- Gagal memuat database --</option>`;
                }
            })
            .catch(err => {
                itemSelect.innerHTML = `<option value="" disabled selected>-- Gagal memuat data (Cek Sinyal) --</option>`;
                console.error(err);
            });
        });

        // FUNGSI UNTUK MENAMPILKAN PRODUK KE DROPDOWN
        function renderProductOptions(products) {
            const itemSelect = document.getElementById('itemName');
            itemSelect.innerHTML = '';
            
            if (products.length === 0) {
                itemSelect.innerHTML = `<option value="" disabled selected>-- Barang tidak ditemukan --</option>`;
                return;
            }
            
            itemSelect.innerHTML = `<option value="" disabled selected>-- Pilih Nama Barang (${products.length} ditemukan) --</option>`;
            products.forEach(p => {
                const option = document.createElement('option');
                option.value = p.nama;
                // Menampilkan format: [Kode] Nama Barang agar staf tahu kodenya
                option.textContent = p.kode ? `[${p.kode}] ${p.nama}` : p.nama;
                itemSelect.appendChild(option);
            });
        }

        // FUNGSI PENCARIAN WILDCARD REVOLUSIONER (%)
        function filterProducts() {
            const query = document.getElementById('searchItem').value.trim();
            
            if (!query) {
                renderProductOptions(allProducts);
                return;
            }
            
            let regexRule = "";
            if (query.includes('%')) {
                // Jika user pakai wildcard %, ubah % menjadi .* ala regex SQL LIKE
                let escaped = query.replace(/([.*+?^=!:${}()|\[\]\/\\])/g, "\\$1");
                regexRule = "^" + escaped.replace(/%/g, ".*") + "$";
            } else {
                // Jika tidak pakai %, otomatis anggap sebagai pencarian potong kata biasa (contains)
                let escaped = query.replace(/([.*+?^=!:${}()|\[\]\/\\])/g, "\\$1");
                regexRule = ".*" + escaped + ".*";
            }
            
            const regex = new RegExp(regexRule, "i"); // "i" artinya tidak sensitif huruf besar/kecil
            
            // Filter berdasarkan Nama BARANG atau KODE BARANG
            const filtered = allProducts.filter(p => {
                return regex.test(p.nama) || regex.test(p.kode);
            });
            
            renderProductOptions(filtered);
        }

        window.addEventListener('beforeunload', function (e) {
            if (cart.length > 0) {
                e.preventDefault();
                e.returnValue = 'Pesanan Anda belum dikirim!';
            }
        });

        function renderCart() {
            const tbody = document.getElementById('cartTableBody');
            const storeSelect = document.getElementById('storeName');
            
            tbody.innerHTML = '';

            if (cart.length === 0) {
                tbody.innerHTML = `
                    <tr id="emptyRow">
                        <td colspan="3" class="p-4 text-center text-gray-400 italic text-xs">Belum ada barang yang ditambahkan.</td>
                    </tr>`;
                storeSelect.disabled = false; 
                return;
            }

            storeSelect.disabled = true; 

            cart.forEach((item, index) => {
                const row = document.createElement('tr');
                row.className = "border-b border-gray-200 bg-white hover:bg-gray-50 transition";
                row.innerHTML = `
                    <td class="p-3 font-medium text-gray-800">${item.name}</td>
                    <td class="p-3 text-center font-bold text-blue-600">${item.qty}</td>
                    <td class="p-3 text-center">
                        <button onclick="removeFromCart(${index})" class="text-red-500 hover:text-red-700 p-1 transition">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function addToCart() {
            const itemSelect = document.getElementById('itemName');
            const qtyInput = document.getElementById('itemQty');

            const itemName = itemSelect.value;
            const itemQty = Math.floor(Number(qtyInput.value)); 

            if (!itemName || itemName.startsWith('--')) {
                alert('Silakan pilih nama barang terlebih dahulu!');
                return;
            }
            if (isNaN(itemQty) || itemQty <= 0) {
                alert('Masukkan jumlah kuantitas yang valid!');
                return;
            }

            const existingIndex = cart.findIndex(item => item.name === itemName);
            if (existingIndex > -1) {
                cart[existingIndex].qty += itemQty;
            } else {
                cart.push({ name: itemName, qty: itemQty });
            }

            // Reset Form Tambah Item & kembalikan list produk ke semula
            itemSelect.selectedIndex = 0;
            qtyInput.value = '';
            document.getElementById('searchItem').value = '';
            renderProductOptions(allProducts); 
            renderCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }

        function submitOrder() {
            const storeName = document.getElementById('storeName').value;
            
            if (!storeName) {
                alert('Maaf, Anda harus memilih Nama Toko terlebih dahulu!');
                return;
            }
            if (cart.length === 0) {
                alert('Daftar pesanan Anda masih kosong!');
                return;
            }

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Mengirim Pesanan...`;

            const payload = { tensor: true, toko: storeName, pesanan: cart };

            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert('Pesanan sukses terkirim ke Google Sheets Admin!');
                cart = [];
                document.getElementById('storeName').disabled = false;
                document.getElementById('storeName').selectedIndex = 0;
                renderCart();
            })
            .catch(err => {
                alert('Gagal mengirim pesanan. Periksa internet Anda.');
                console.error(err);
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> Kirim Semua Pesanan Sekarang`;
            });
        }
    </script>
</body>
</html>
